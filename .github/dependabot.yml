version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: daily
      time: "10:00"
    cooldown:
      default-days: 7
      semver-major-days: 14

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: daily
      time: "10:00"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
      semver-major-days: 14
    ignore:
      - dependency-name: setuptools-rust
        versions:
          - 0.12.0
      - dependency-name: moz-sql-parser
        versions:
          - 4.17.21027
          - 4.18.21031

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
