name: build-wheels

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  linux-wheels:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, i686, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          maturin-version: latest
          command: build
          manylinux: auto
          args: --release --sdist -i 3.9 3.10 3.11 3.12 3.13 3.13t 3.14 3.14t
      - uses: actions/upload-artifact@v4
        with:
          name: linux-wheels-${{ matrix.target }}
          path: target/wheels/

  osx-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            python-version: "3.9"
          - os: macos-latest
            target: x86_64-apple-darwin
            python-version: "3.10"
          - os: macos-latest
            target: x86_64-apple-darwin
            python-version: "3.11"
          - os: macos-latest
            target: x86_64-apple-darwin
            python-version: "3.12"
          - os: macos-latest
            target: x86_64-apple-darwin
            python-version: "3.13"
          - os: macos-latest
            target: x86_64-apple-darwin
            python-version: "3.13t"
          - os: macos-latest
            target: x86_64-apple-darwin
            python-version: "3.14"
          - os: macos-latest
            target: x86_64-apple-darwin
            python-version: "3.14t"
          - os: macos-latest
            target: aarch64-apple-darwin
            python-version: "3.9"
          - os: macos-latest
            target: aarch64-apple-darwin
            python-version: "3.10"
          - os: macos-latest
            target: aarch64-apple-darwin
            python-version: "3.11"
          - os: macos-latest
            target: aarch64-apple-darwin
            python-version: "3.12"
          - os: macos-latest
            target: aarch64-apple-darwin
            python-version: "3.13"
          - os: macos-latest
            target: aarch64-apple-darwin
            python-version: "3.13t"
          - os: macos-latest
            target: aarch64-apple-darwin
            python-version: "3.14"
          - os: macos-latest
            target: aarch64-apple-darwin
            python-version: "3.14t"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          maturin-version: latest
          command: build
          args: --release
      - uses: actions/upload-artifact@v4
        with:
          name: osx-${{ matrix.target }}-${{ matrix.python-version }}-wheel
          path: target/wheels/

  windows-wheels:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.13t", "3.14", "3.14t"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - uses: PyO3/maturin-action@v1
        with:
          maturin-version: latest
          command: build
          args: --release
      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.python-version }}-wheel
          path: target/wheels/

  collect-wheels:
    needs: [osx-wheels, windows-wheels, linux-wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: wheels/
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R wheels/

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: all-wheels
          path: wheels/
          retention-days: 7

  publish-pypi:
    needs: [collect-wheels]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: all-wheels
          path: wheels/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI }}
          packages_dir: wheels/
          verify_metadata: false
